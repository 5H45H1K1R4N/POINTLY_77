name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

     - name: Set up JDK 21
  uses: actions/setup-java@v4
  with:
    distribution: temurin
    java-version: '21'
    cache: gradle

- name: Verify Java
  run: |
    echo "JAVA_HOME=$JAVA_HOME"
    java -version
    javac -version
    which java

- name: Make Gradle executable
  run: chmod +x ./gradlew

- name: Build APK
  run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pointly77-debug
          path: app/build/outputs/apk/debug/*.apk
